# Skeletor glass rice base.
# This is intentionally self-contained so it does not affect your Plasma setup.

monitor=,preferred,auto,1

$terminal = kitty
$fileManager = dolphin
$menu = krunner

exec-once = hyprpaper
exec-once = sh -c 'sleep 2; hyprctl hyprpaper wallpaper "eDP-1,/home/stephxlr8/Pictures/3c3b1105-d369-4833-8649-87ba80a3fb4f.png"'
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = waybar
exec-once = quickshell --no-duplicate
exec-once = playerctld daemon

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(9b6cffcc) rgba(eef0ffff) 45deg
    col.inactive_border = rgba(15102288)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 8
    active_opacity = 0.96
    inactive_opacity = 0.88

    shadow {
        enabled = true
        range = 22
        render_power = 4
        color = rgba(000000aa)
        color_inactive = rgba(00000070)
    }

    blur {
        enabled = true
        size = 11
        passes = 4
        new_optimizations = true
        ignore_opacity = true
        xray = false
        vibrancy = 0.18
        vibrancy_darkness = 0.05
    }
}

# Frosted glass on quickshell desktop widgets (layer Bottom -> blurs wallpaper behind)
# 0.53+ syntax: rule value + match:namespace <ns>
layerrule = blur on, match:namespace skeletor-widgets
layerrule = ignore_alpha 0.08, match:namespace skeletor-widgets

animations {
    enabled = true
    bezier = glass, 0.18, 0.9, 0.22, 1.0
    animation = windows, 1, 5, glass, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 5, glass
    animation = workspaces, 1, 6, glass, slide
    animation = layers, 1, 5, glass, slide
}

dwindle {
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

bind = SUPER, T, exec, $terminal
bind = SUPER, E, exec, $fileManager
bind = SUPER, D, exec, $menu
bind = SUPER, Q, killactive
bind = SUPER, M, exit
bind = SUPER, F, fullscreen
bind = SUPER, V, togglefloating
bind = SUPER, P, pseudo

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# --- Function / media keys ---
# volume (bindel = repeat while held + works on lock screen; cap at 100%)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# screen brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# keyboard backlight (ASUS, 0..3)
bindel = , XF86KbdBrightnessUp, exec, brightnessctl --device='asus::kbd_backlight' set +1
bindel = , XF86KbdBrightnessDown, exec, brightnessctl --device='asus::kbd_backlight' set 1-

# F7: display switcher menu (mirror / extend / single)
# multiple keysyms/keycodes so it fires regardless of Fn-lock / firmware mapping
bind = , XF86Display, exec, ~/.config/hypr/scripts/display-menu.sh
bind = , F7, exec, ~/.config/hypr/scripts/display-menu.sh
bind = , code:227, exec, ~/.config/hypr/scripts/display-menu.sh
# guaranteed manual shortcut (works regardless of the F7 key)
bind = SUPER, O, exec, ~/.config/hypr/scripts/display-menu.sh

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow


# Frosted glass on waybar (match the widgets)
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.1, match:namespace waybar

# Frosted glass on rofi menus (match the widgets)
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.1, match:namespace rofi
